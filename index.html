<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<!-- maximum-scale=1 гасит авто-зум iOS при фокусе на инпутах (<16px); pinch-зум при этом работает -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Бюджет — личный реестр</title>
<meta name="theme-color" content="#D7D2C4">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Бюджет">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='84' font-family='Georgia,serif' font-weight='800'>Б</text><circle cx='88' cy='84' r='9' fill='%23B0611A'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;0,900;1,600;1,700&family=Golos+Text:wght@400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --canvas:#D7D2C4; --paper:#E9E6DD; --paper-2:#F1EEE6;
    --ink:#1C1A16; --ink-2:#6E6858; --ink-3:#A29B8A;
    --rule:#CDC7B8; --rule-2:#B4AD9C;
    --accent:#B0611A; --accent-ink:#8F4D14;
    --accent-soft:rgba(176,97,26,.10); --accent-line:rgba(176,97,26,.30);
    --pos:#556A34; --neg:#8A3B2A;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{background:var(--canvas);color:var(--ink);font-family:"Golos Text",system-ui,sans-serif;font-size:14px;line-height:1.5;padding:40px 20px 70px}
  .canvas{display:flex;justify-content:center}
  .sheet{width:100%;max-width:1040px;background:var(--paper);border:1px solid var(--rule-2);box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 24px 60px -30px rgba(28,26,22,.35);padding:40px 52px 36px;position:relative}
  @media(max-width:720px){.sheet{padding:28px 22px 28px}}

  .num{font-family:"IBM Plex Mono",monospace;font-feature-settings:"tnum" 1;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .rub{color:var(--ink-2);font-size:.72em;padding-left:.15em;font-weight:500}
  .usd{color:var(--ink-3);font-size:.62em;padding-left:.4em;font-weight:500;letter-spacing:0}
  .pos{color:var(--pos)} .neg{color:var(--neg)} .muted{color:var(--ink-3)}
  .kicker{font-size:10.5px;text-transform:uppercase;letter-spacing:.2em;color:var(--ink-2);font-weight:600}

  /* meta bar */
  .meta{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;padding-bottom:12px;border-bottom:1px solid var(--ink);font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2)}
  .meta b{color:var(--ink);font-weight:600}
  .meta .grow{flex:1}
  .meta .mchip{display:inline-flex;align-items:center;gap:6px;cursor:default}
  .meta .mchip .dot{width:7px;height:7px;border-radius:50%;background:var(--ink-3)}
  .meta .mchip.ok .dot{background:var(--pos)} .meta .mchip.warn .dot{background:var(--accent)}
  .meta button.link{appearance:none;background:none;border:none;font:inherit;color:var(--accent-ink);cursor:pointer;text-transform:uppercase;letter-spacing:.08em;padding:0}
  .meta button.link:hover{color:var(--accent);text-decoration:underline}
  .meta .curtog{border:1px solid var(--rule-2);border-radius:2px;padding:2px 7px;color:var(--ink-2)}
  .meta .curtog.on{border-color:var(--accent);color:var(--accent)}

  /* masthead */
  .masthead{display:grid;grid-template-columns:1fr auto;gap:36px;align-items:end;padding:26px 0 22px;border-bottom:2px solid var(--ink);position:relative}
  @media(max-width:720px){.masthead{grid-template-columns:1fr;gap:20px}}
  .mast-left .kicker{margin-bottom:12px}
  .wordmark{font-family:"Playfair Display",serif;font-weight:800;font-size:96px;line-height:.86;letter-spacing:-.03em;color:var(--ink)}
  @media(max-width:720px){.wordmark{font-size:64px}}
  .wordmark .dot{color:var(--accent)}
  .dateline{margin-top:14px;font-family:"IBM Plex Mono",monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2)}
  .dateline .bar{color:var(--rule-2);padding:0 6px}
  .mast-right{display:flex;flex-direction:column;gap:13px;min-width:280px;border-left:1px solid var(--rule);padding-left:24px}
  @media(max-width:720px){.mast-right{border-left:none;padding-left:0;border-top:1px solid var(--rule);padding-top:16px}}
  .fig{display:flex;flex-direction:column;gap:3px}
  .fig-label{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--ink-2);font-weight:600}
  .fig-value{font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums;font-size:22px;font-weight:500;letter-spacing:-.02em;line-height:1}
  .fig.small .fig-value{font-size:13.5px;color:var(--ink-2);font-weight:400;letter-spacing:0}
  .fig.small .fig-value b{color:var(--ink);font-weight:500}
  .stamp{position:absolute;top:20px;right:0;width:92px;height:92px;border:1.5px solid var(--accent-line);border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center;transform:rotate(-9deg);color:var(--accent);opacity:.85;pointer-events:none}
  @media(max-width:720px){.stamp{display:none}}
  .stamp span{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;line-height:1.35;font-weight:600}

  /* sections */
  .sec{padding-top:32px}
  .sec-head{display:flex;align-items:baseline;gap:14px;padding-bottom:13px;margin-bottom:16px;border-bottom:1px solid var(--rule)}
  .idx{font-family:"Playfair Display",serif;font-weight:700;font-size:19px;color:var(--accent);font-style:italic;line-height:1}
  .sec-head h2{font-family:"Playfair Display",serif;font-weight:700;font-size:26px;letter-spacing:-.01em;line-height:1}
  .sec-head h2 .navm{cursor:pointer;user-select:none}
  .sec-note{margin-left:auto;font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);text-align:right}
  .sec-note b{color:var(--accent-ink);font-weight:600}
  .navbtn{appearance:none;background:none;border:1px solid var(--rule-2);color:var(--ink-2);font-family:"IBM Plex Mono",monospace;font-size:12px;width:24px;height:24px;line-height:1;cursor:pointer;border-radius:2px;margin:0 2px}
  .navbtn:hover{border-color:var(--accent);color:var(--accent)}

  /* register table */
  table.reg{width:100%;border-collapse:collapse}
  table.reg thead th{font-size:9.5px;text-transform:uppercase;letter-spacing:.11em;font-weight:600;color:var(--ink-2);text-align:right;padding:0 0 10px;vertical-align:bottom;border-bottom:1px solid var(--rule-2)}
  table.reg thead th.lft{text-align:left}
  table.reg thead th .sub{display:block;color:var(--ink-3);font-size:8.5px;letter-spacing:.09em;margin-top:2px}
  table.reg tbody td{padding:8px 0;text-align:right;border-bottom:1px solid var(--rule);font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums;font-size:12.5px;color:var(--ink);white-space:nowrap}
  table.reg td.no{text-align:left;color:var(--accent);font-size:11px;width:30px;letter-spacing:0}
  table.reg td.mon{text-align:left;font-family:"Golos Text",sans-serif;font-variant-numeric:normal;font-size:13px;font-weight:500;letter-spacing:.01em}
  table.reg td.mon .yr{color:var(--ink-3);font-weight:400;padding-left:5px;font-size:11px}
  table.reg td.dl{color:var(--pos)} table.reg td.dl.neg{color:var(--neg)}
  table.reg td.cum{color:var(--ink);font-weight:500} table.reg td.cum.neg{color:var(--neg)}
  table.reg td:not(.no):not(.mon),table.reg th:not(.lft){padding-left:20px}
  table.reg tbody tr{cursor:pointer}
  table.reg tbody tr:hover td{background:rgba(28,26,22,.03)}
  table.reg tr.now td{background:var(--accent-soft);border-bottom-color:var(--accent-line)}
  table.reg tr.now:hover td{background:var(--accent-soft)}
  table.reg tr.now td.no{color:var(--accent);font-weight:600;position:relative}
  table.reg tr.now td.no::before{content:"";position:absolute;left:-52px;top:0;bottom:0;width:3px;background:var(--accent)}
  @media(max-width:720px){table.reg tr.now td.no::before{left:-22px}}
  table.reg tr.now td.mon{font-weight:700}
  table.reg tr.detail td{box-shadow:inset 0 0 0 9999px rgba(28,26,22,.035)}
  .tag{display:inline-block;font-family:"IBM Plex Mono",monospace;font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent-line);padding:1px 5px;margin-left:8px;vertical-align:1px;font-weight:600}
  .lockb{display:inline-block;font-family:"IBM Plex Mono",monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--pos);border:1px solid rgba(85,106,52,.4);padding:1px 4px;margin-left:7px;vertical-align:1px;font-weight:600}
  .factnote{display:block;font-size:10px;color:var(--accent-ink);margin-top:2px;letter-spacing:0}
  table.reg tfoot td{padding:12px 0 2px;text-align:right;border-top:2px solid var(--ink);font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums;font-size:13px;font-weight:600;color:var(--ink)}
  table.reg tfoot td:not(.no):not(.mon){padding-left:20px}
  table.reg tfoot td.mon{text-align:left;font-family:"Golos Text",sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-2);font-weight:600}
  table.reg tfoot td.no{text-align:left} table.reg tfoot td.dl{color:var(--pos)}

  /* delta strip */
  .delta-strip{padding:6px 0 0}
  .bars{position:relative;height:132px;display:flex;align-items:flex-end;border-bottom:1.5px solid var(--ink)}
  .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;position:relative}
  .bar{width:5px;background:var(--ink)} .col.cur .bar{width:7px;background:var(--accent)}
  .col.negb .bar{background:var(--neg)}
  .col .cap{position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-family:"IBM Plex Mono",monospace;font-size:8.5px;color:var(--ink-3);white-space:nowrap;letter-spacing:-.02em}
  .col.cur .cap{color:var(--accent-ink);font-weight:600}
  .avg-line{position:absolute;left:0;right:0;border-top:1px dashed var(--rule-2)}
  .avg-tag{position:absolute;right:0;top:-14px;font-family:"IBM Plex Mono",monospace;font-size:8.5px;letter-spacing:.06em;color:var(--ink-2);text-transform:uppercase;background:var(--paper);padding-left:6px}
  .axis{display:flex;margin-top:8px}
  .axis .t{flex:1;text-align:center;font-family:"IBM Plex Mono",monospace;font-size:9.5px;color:var(--ink-2)}
  .axis .t.cur{color:var(--accent-ink);font-weight:600}

  /* current month grid */
  .month-grid{display:grid;grid-template-columns:1.15fr 1fr;gap:0}
  @media(max-width:820px){.month-grid{grid-template-columns:1fr;gap:28px}}
  .cats{padding-right:40px;border-right:1px solid var(--rule)}
  @media(max-width:820px){.cats{padding-right:0;border-right:none}}
  .ledger{padding-left:40px}
  @media(max-width:820px){.ledger{padding-left:0}}
  .block-label{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--ink-2);font-weight:600;display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
  .block-label .r{font-family:"IBM Plex Mono",monospace;letter-spacing:.04em;color:var(--ink-3)}
  .mlock .cat .mk,.mlock .addcat,.mlock #incFact,.mlock .cat .del,.mlock .cat .nm input{pointer-events:none;opacity:.6}
  .mlock-note{margin-top:6px;font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--pos)}

  /* income rows */
  .inc{display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--rule)}
  .inc .nm{font-size:12.5px;color:var(--ink)}
  .inc .cur{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--ink-3);width:14px}
  .inc-foot{display:flex;justify-content:space-between;padding-top:10px;margin-top:2px;border-top:1px solid var(--rule-2);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-2);font-weight:600}
  .inc-foot .num{font-size:13px;font-weight:600;color:var(--ink)}

  /* category rows */
  .cat{display:grid;grid-template-columns:16px 1fr 78px 78px auto;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--rule)}
  .cat .mk{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--ink-2);cursor:pointer;transition:.12s;background:transparent}
  .cat .mk:hover{border-color:var(--accent)}
  .cat.done .mk{background:var(--accent);border-color:var(--accent)}
  .cat .nm{font-size:13px;color:var(--ink)}
  .cat.done .nm{color:var(--ink-2)}
  .cat .amtw{text-align:right}
  .cat .amt{font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums;font-size:12.5px;color:var(--ink)}
  .cat.done .plan{color:var(--ink-3);text-decoration:line-through;text-decoration-thickness:1px}
  .cat .factin{opacity:0;transition:.12s}
  .cat.done .factin,.cat:hover .factin{opacity:1}
  .cat .del{appearance:none;background:none;border:none;color:var(--ink-3);cursor:pointer;font-size:13px;line-height:1;padding:2px 4px;opacity:0;transition:.12s}
  .cat:hover .del{opacity:1} .cat .del:hover{color:var(--neg)}
  .addcat{display:flex;gap:8px;align-items:center;padding:10px 0 0;flex-wrap:wrap}
  .cats-foot{display:grid;grid-template-columns:16px 1fr 78px 78px auto;gap:9px;padding-top:12px;margin-top:2px;border-top:2px solid var(--ink)}
  .cats-foot .lb{grid-column:2;font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-2);font-weight:600;align-self:center}
  .cats-foot .amt{text-align:right;font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums;font-size:14px;font-weight:600}

  /* ledger entries */
  .entry{display:grid;grid-template-columns:auto 1fr auto auto;align-items:baseline;gap:10px;padding:8px 0;border-bottom:1px solid var(--rule)}
  .entry .d{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--ink-2);white-space:nowrap}
  .entry .nm{font-size:12.5px;color:var(--ink-2)}
  .entry .paid{display:inline-block;margin-left:8px;font-family:"IBM Plex Mono",monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent-line);padding:1px 5px;vertical-align:1px;font-weight:600}
  .entry .vari{display:inline-block;margin-left:6px;font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.04em}
  .entry .a{font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums;font-size:12.5px;color:var(--ink-3);text-decoration:line-through;text-decoration-thickness:1px;white-space:nowrap}
  .entry .re{appearance:none;background:none;border:none;color:var(--ink-3);cursor:pointer;font-size:11px;padding:0 2px}
  .entry .re:hover{color:var(--accent)}
  .empty{color:var(--ink-3);font-size:12px;padding:14px 0;font-style:italic}
  .log-sum{margin-top:16px;padding:14px 16px;background:var(--paper-2);border:1px solid var(--rule)}
  .log-sum .row{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0}
  .log-sum .row .k{font-size:11px;color:var(--ink-2);text-transform:uppercase;letter-spacing:.07em}
  .log-sum .row .v{font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums;font-size:13px;font-weight:500}
  .log-sum .row.big .v{font-size:15px;color:var(--accent-ink);font-weight:600}

  /* goals */
  .goal{display:grid;grid-template-columns:1fr 1.2fr;gap:40px;align-items:start;padding-bottom:20px;margin-bottom:20px;border-bottom:1px solid var(--rule)}
  .goal:last-of-type{border-bottom:none;margin-bottom:0}
  @media(max-width:820px){.goal{grid-template-columns:1fr;gap:24px}}
  .g-lab{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--ink-2);font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .goal-target{font-family:"Playfair Display",serif;font-weight:800;font-size:42px;line-height:.9;letter-spacing:-.02em}
  .goal-target .rub{font-size:.44em;font-weight:600}
  .goal-target .usd{font-size:.30em}
  .goal-sub{margin-top:12px;font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.03em;color:var(--ink-2);text-transform:uppercase;line-height:1.7}
  .goal-sub b{color:var(--ink)}
  .gpri{display:inline-flex;gap:2px}
  .gpri button{appearance:none;background:none;border:1px solid var(--rule-2);color:var(--ink-3);cursor:pointer;font-size:10px;width:19px;height:19px;line-height:1;border-radius:2px}
  .gpri button:hover{border-color:var(--accent);color:var(--accent)}
  .prio-badge{font-family:"IBM Plex Mono",monospace;font-size:9px;color:var(--accent);border:1px solid var(--accent-line);padding:1px 5px;border-radius:2px}
  .prog-meta{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:baseline;gap:2px 8px;font-family:"IBM Plex Mono",monospace;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-2);margin-bottom:9px}
  .prog-meta .cur{text-align:center}
  @media(max-width:720px){.prog-meta .cur{flex-basis:100%;order:3;margin-top:2px}}
  .prog-meta .cur{color:var(--accent-ink);font-weight:600}
  .track-big{position:relative;height:14px;background:var(--paper-2);border:1px solid var(--rule-2)}
  .track-big .forecast{position:absolute;left:0;top:0;bottom:0;background:var(--accent-soft);border-right:1px dashed var(--accent-line)}
  .track-big .fill{position:absolute;left:0;top:0;bottom:0;background:var(--accent)}
  .ticks{display:flex;margin-top:7px}
  .ticks .tk{flex:1;border-left:1px solid var(--rule-2);padding-left:5px;font-family:"IBM Plex Mono",monospace;font-size:9px;color:var(--ink-3)}
  .ticks .tk:last-child{border-right:1px solid var(--rule-2)}
  .forecast-box{margin-top:22px;padding-top:16px;border-top:1px solid var(--rule);display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--rule)}
  .forecast-box .fc{background:var(--paper);padding:12px 14px 12px 0}
  .forecast-box .fc:not(:first-child){padding-left:18px}
  .forecast-box .fc .k{font-size:9.5px;text-transform:uppercase;letter-spacing:.11em;color:var(--ink-2);font-weight:600;margin-bottom:6px}
  .forecast-box .fc .v{font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums;font-size:17px;font-weight:500;letter-spacing:-.02em}
  .forecast-box .fc .v.neg{color:var(--neg)} .forecast-box .fc .v.pos{color:var(--pos)}
  .forecast-box .fc .s{font-size:10px;color:var(--ink-3);margin-top:4px;letter-spacing:0;text-transform:none;font-family:"Golos Text",sans-serif}
  .whatif{margin-top:12px;padding:10px 2px 0;background:none;border:none;border-top:1px dashed var(--rule);display:flex;flex-wrap:wrap;align-items:center;gap:8px 10px;font-size:12px;color:var(--ink-2);line-height:1.5}
  .whatif b{color:var(--ink)} .whatif .res{color:var(--accent-ink);font-weight:600;font-family:"IBM Plex Mono",monospace}
  .whatif input{width:66px}
  .alloc{margin-top:14px;padding:11px 14px;background:var(--paper-2);border:1px solid var(--rule);display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-size:12px;color:var(--ink-2)}
  .alloc .free{margin-right:auto;white-space:nowrap}
  .alloc .free b{color:var(--ink);font-family:"IBM Plex Mono",monospace}
  .alloc input.aival{width:88px}
  .pool-split{margin-top:8px;font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--ink-2);display:flex;gap:10px;align-items:baseline}
  .pool-split b{color:var(--ink)} .pool-split .sep{color:var(--rule-2)}
  .pool{margin-top:20px;padding-top:14px;border-top:1px solid var(--rule)}
  .pool .p-val{font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums;font-size:24px;font-weight:500;letter-spacing:-.02em;margin-top:4px}
  .pool .p-note{font-size:11px;color:var(--ink-2);margin-top:6px;line-height:1.5}
  .recon{margin-top:14px;padding:10px 14px;background:var(--paper-2);border:1px solid var(--rule);display:flex;flex-wrap:wrap;justify-content:space-between;gap:8px 16px;font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--ink-2)}
  .recon .rv{color:var(--ink);font-weight:500}
  .bmonths{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:2px 24px}

<body>
<div class="canvas"><main class="sheet" id="sheet"></main></div>

<script>
/* ===================== state ===================== */
const LS_KEY='budget-omp-v3';
const M_NOM=['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
const M_ROD=['Января','Февраля','Марта','Апреля','Мая','Июня','Июля','Августа','Сентября','Октября','Ноября','Декабря'];
const M_CAP=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const M_SH=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const M_DAT=['январю','февралю','марту','апрелю','маю','июню','июлю','августу','сентябрю','октябрю','ноябрю','декабрю'];
const uid=()=>'x'+Math.random().toString(36).slice(2,9);

function defaultState(){const ym=todayYM();return{
  version:6,
  settings:{planRate:78,incomePlan:0,horizonStart:ym,horizonMonths:12,bonusCons:300,bonusAvg:1000,showUsd:false},
  template:{
    expenses:[
      {id:'e1',name:'Жильё',amount:0},
      {id:'e2',name:'Питание',amount:0},
      {id:'e3',name:'Транспорт',amount:0},
      {id:'e4',name:'Прочее',amount:0},
    ]
  },
  months:{}, bonuses:[], goals:[], bonusHistory:[], bonusOverrides:{},
  accounts:[], sinkingFunds:[],
  bonusSync:{enabled:false,sheetId:'',gid:'',yearBase:new Date().getFullYear(),intervalSec:60,lastSync:null}
};}

let state=loadLocal()||defaultState();
migrate();
let detailYM=todayYM();

/* ===================== date/format ===================== */
function todayYM(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function todayStr(){const d=new Date();return d.toISOString().slice(0,10);}
function ddmm(dateStr){if(!dateStr)return'';const p=dateStr.split('-');return p[2]+'.'+p[1];}
function ymAdd(ym,n){let[y,m]=ym.split('-').map(Number);m+=n;y+=Math.floor((m-1)/12);m=((m-1)%12+12)%12+1;return y+'-'+String(m).padStart(2,'0');}
function ymDiff(a,b){const[ya,ma]=a.split('-').map(Number),[yb,mb]=b.split('-').map(Number);return(yb-ya)*12+(mb-ma);}
function mIdx(ym){return Number(ym.split('-')[1])-1;}
function mYear(ym){return ym.split('-')[0];}
function fmt(n){if(n==null||isNaN(n))return'—';return new Intl.NumberFormat('ru-RU',{maximumFractionDigits:0}).format(Math.round(n));}
function fmtS(n){if(n==null||isNaN(n))return'—';return(n>0?'+':n<0?'−':'')+fmt(Math.abs(n));}
function parseNum(v){if(v==null)return null;const s=String(v).replace(/[\s ₽$]/g,'').replace(',','.');if(s==='')return null;const n=Number(s);return isNaN(n)?null:n;}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* dual currency */
function curRate(){return cbrNow||state.settings.planRate||78;}
function usd(rub){if(rub==null||isNaN(rub))return'—';return'$'+fmt(rub/curRate());}
function showUsd(){return !!state.settings.showUsd;}
function sub$(rub){return showUsd()?`<span class="usd">≈ ${usd(rub)}</span>`:'';}

/* ===================== migrate ===================== */
function migrate(){
  // защитный бэкфилл: приложение не должно падать на частичном/битом state
  // (например, если синком пришла неполная копия). Обязательные поля — с дефолтами.
  if(!state||typeof state!=='object')state=defaultState();
  if(!state.settings||typeof state.settings!=='object')state.settings={};
  const _s=state.settings;
  if(!/^\d{4}-\d{2}$/.test(_s.horizonStart||''))_s.horizonStart=todayYM();
  if(!(_s.horizonMonths>=1&&_s.horizonMonths<=36))_s.horizonMonths=12;
  if(_s.planRate==null)_s.planRate=78;
  if(_s.incomePlan==null)_s.incomePlan=0;
  if(!state.template||typeof state.template!=='object')state.template={};
  if(!Array.isArray(state.template.expenses))state.template.expenses=[];
  if(!state.months||typeof state.months!=='object')state.months={};
  if(!Array.isArray(state.goals))state.goals=[];
  if(!Array.isArray(state.bonuses))state.bonuses=[];
  if(!state.version)state.version=1;
  if(state.version<2){
    Object.values(state.months||{}).forEach(m=>{
      (m.expenses||[]).forEach(e=>{if(e.closed===undefined){e.closed=false;e.closedDate=null;}});
    });
    state.version=2;
  }
  if(state.version<3){
    const s=state.settings;const rate=s.planRate||78;
    if(state.template&&state.template.incomes){
      s.incomePlan=state.template.incomes.reduce((a,t)=>a+(t.cur==='USD'?(t.amount||0)*rate:(t.amount||0)),0);
      delete state.template.incomes;
    }
    if(s.incomePlan==null)s.incomePlan=0;
    Object.values(state.months||{}).forEach(m=>{
      if(m.incomes){
        const f=m.incomes.map(r=>r.fact==null?null:(r.cur==='USD'?r.fact*(r.rate||rate):r.fact)).filter(v=>v!=null);
        m.incomeFact=f.length?Math.round(f.reduce((a,b)=>a+b,0)):null;
        delete m.incomes;
      }
      if(m.incomeFact===undefined)m.incomeFact=null;
    });
    state.version=3;
  }
  if(state.version<4){
    // Бюджетный год: июнь 2026 → май 2027 (12 мес), июнь — 1-й месяц.
    // Доход месяца = деньги, пришедшие 5-го числа (= зп за ПРЕДЫДУЩИЙ месяц); траты — этого же
    // календарного месяца, покрываются этим доходом. Суммы дохода вносятся вручную — данные не трогаем.
    state.settings.horizonStart='2026-06';
    state.settings.horizonMonths=12;
    state.version=4;
  }
  if(state.version<5){
    // приоритет целей (пул раскладывается по приоритету, без двойного счёта);
    // блокировка месяца; конверты; счета; двойная валюта.
    (state.goals||[]).forEach((g,i)=>{if(g.priority==null)g.priority=i+1;});
    Object.values(state.months||{}).forEach(m=>{if(m.locked===undefined)m.locked=false;});
    if(state.settings.showUsd===undefined)state.settings.showUsd=false;
    state.version=5;
  }
  if(state.version<6){
    // Ручное распределение пула: у каждой цели своя отложенная сумма g.saved.
    // Ты сам решаешь, какую цель пополнить из пула и на сколько (не автомат по приоритету).
    (state.goals||[]).forEach(g=>{if(g.saved==null)g.saved=0;});
    state.version=6;
  }
  if(!state.bonusHistory)state.bonusHistory=[];
  if(!state.bonusOverrides)state.bonusOverrides={};
  if(!state.accounts)state.accounts=[];
  if(!state.sinkingFunds)state.sinkingFunds=[];
  (state.goals||[]).forEach(g=>{if(g.saved==null)g.saved=0;});
  if(!state.bonusSync)state.bonusSync={enabled:false,sheetId:'',gid:'',yearBase:new Date().getFullYear(),intervalSec:60,lastSync:null};
}

/* ===================== model helpers ===================== */
function monthTpl(){return{
  incomeFact:null,locked:false,
  expenses:state.template.expenses.map(t=>({id:uid(),tplId:t.id,name:t.name,plan:t.amount,fact:null,closed:false,closedDate:null})),
};}
function getMonth(ym){return state.months[ym]||monthTpl();}
function matM(ym){if(!state.months[ym])state.months[ym]=monthTpl();return state.months[ym];}
function horizon(){const s=state.settings;return Array.from({length:s.horizonMonths},(_,i)=>ymAdd(s.horizonStart,i));}

function incPlan(ym){return state.settings.incomePlan||0;}
function incFact(ym){const v=getMonth(ym).incomeFact;return v==null?null:v;}
function bonusRub(b){return b.rub!=null?b.rub:(b.usd!=null?b.usd*(b.rate||state.settings.planRate):0);}

function totals(ym){
  const m=getMonth(ym);
  const ip=incPlan(ym);
  const if_=incFact(ym);
  const ep=m.expenses.reduce((s,r)=>s+(r.plan||0),0);
  const closed=m.expenses.filter(e=>e.closed);
  const anyClosed=closed.length>0;
  const efClosed=closed.reduce((s,e)=>s+((e.fact!=null?e.fact:e.plan)||0),0);
  const openSum=m.expenses.filter(e=>!e.closed).reduce((s,e)=>s+(e.plan||0),0);
  const dPlan=ip-ep;
  const hasFact=if_!=null||anyClosed;
  const dFact=hasFact?((if_!=null?if_:ip)-efClosed):null;
  return{ip,if_,ep,efClosed,openSum,anyClosed,closedCount:closed.length,catCount:m.expenses.length,dPlan,dFact,hasFact,locked:!!m.locked};
}
function annualPlanDelta(){return horizon().reduce((s,ym)=>s+totals(ym).dPlan,0);}
function annualFactDelta(){let sum=0,mo=0;horizon().forEach(ym=>{const t=totals(ym);if(t.dFact!=null){sum+=t.dFact;mo++;}});return{sum,mo};}
function lockedFactCum(){let sum=0,mo=0;horizon().forEach(ym=>{const t=totals(ym);if(t.locked&&t.dFact!=null){sum+=t.dFact;mo++;}});return{sum,mo};}
function endCumulative(){let c=0;horizon().forEach(ym=>c+=totals(ym).dPlan);return c;}
/* пул: ты сам распределяешь свободные деньги по целям (g.saved) */
function poolIn(){return state.bonuses.reduce((s,b)=>s+bonusRub(b),0);}                                  // всего заведено в пул
function poolSpentDone(){return state.goals.filter(g=>g.done).reduce((s,g)=>s+(g.spent||0),0);}          // потрачено на купленные цели
function poolAllocated(){return state.goals.filter(g=>!g.done).reduce((s,g)=>s+(g.saved||0),0);}         // отложено под активные цели
function poolTotal(){return poolIn()-poolSpentDone();}                                                   // ещё не потрачено (свободно + отложено)
function poolFree(){return poolTotal()-poolAllocated();}                                                 // свободно к распределению
function poolBalance(){return poolTotal();}                                                              // совместимость
// Инвариант: poolAllocated <= poolTotal. Если приток пула упал (удалили/поправили бонус,
// сменили курс) или цель купили дороже отложенного — урезаем g.saved активных целей
// (с конца списка), чтобы распределённое не превышало доступное.
function reconcilePool(){
  let over=poolAllocated()-poolTotal();
  if(over<=0)return;
  const gs=sortedGoals().reverse();
  for(const g of gs){if(over<=0)break;const cut=Math.min(g.saved||0,over);g.saved=(g.saved||0)-cut;over-=cut;}
}
function sortedGoals(){return state.goals.filter(g=>!g.done).slice().sort((a,b)=>(a.priority||99)-(b.priority||99)||(a.targetMonth||'').localeCompare(b.targetMonth||''));}
function accountsRub(){return (state.accounts||[]).reduce((s,a)=>s+((a.cur==='USD'?(a.balance||0)*curRate():(a.balance||0))),0);}
function sinkingTotal(){return (state.sinkingFunds||[]).reduce((s,f)=>s+(f.balance||0),0);}

function effBonus(){
  const ov=state.bonusOverrides||{};
  return (state.bonusHistory||[]).map(x=>{
    const o=ov[x.month];
    return {month:x.month,sheetUsd:x.usd,usd:o!=null?o:x.usd,overridden:o!=null};
  });
}
function bonusStats(){
  const h=effBonus().filter(x=>x.usd!=null&&x.usd>0);
  if(!h.length)return null;
  const vals=h.map(x=>x.usd).slice().sort((a,b)=>a-b);
  const sum=vals.reduce((a,b)=>a+b,0),mean=sum/vals.length;
  const median=vals.length%2?vals[(vals.length-1)/2]:(vals[vals.length/2-1]+vals[vals.length/2])/2;
  const max=vals[vals.length-1];
  const maxRow=h.find(x=>x.usd===max);
  return{n:vals.length,sum,mean,median,max,maxMonth:maxRow?maxRow.month:null};
}

/* ===================== persistence ===================== */
function loadLocal(){try{const s=JSON.parse(localStorage.getItem(LS_KEY));return s&&s.version?s:null;}catch(e){return null;}}
let fileHandle=null,saveTimer=null;
const idb={
  db(){return new Promise((res,rej)=>{const r=indexedDB.open('budget-fsa2',1);r.onupgradeneeded=()=>r.result.createObjectStore('kv');r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});},
  async get(k){const d=await this.db();return new Promise(res=>{const t=d.transaction('kv').objectStore('kv').get(k);t.onsuccess=()=>res(t.result);t.onerror=()=>res(null);});},
  async set(k,v){const d=await this.db();return new Promise(res=>{const t=d.transaction('kv','readwrite');t.objectStore('kv').put(v,k);t.oncomplete=()=>res();});},
  async del(k){const d=await this.db();return new Promise(res=>{const t=d.transaction('kv','readwrite');t.objectStore('kv').delete(k);t.oncomplete=()=>res();});}
};
let saveMode='local';
let devSyncCfg=null,devSyncState='idle',devApplying=false,devPushTimer=null,devLoopTimer=null;
function save(){
  reconcilePool();
  state.savedAt=new Date().toISOString();
  localStorage.setItem(LS_KEY,JSON.stringify(state));
  if(fileHandle){
    saveMode='saving';updateChips();
    clearTimeout(saveTimer);
    saveTimer=setTimeout(async()=>{
      try{const w=await fileHandle.createWritable();await w.write(JSON.stringify(state,null,2));await w.close();saveMode='file';}
      catch(e){saveMode='local';}
      updateChips();
    },500);
  }
  if(devSyncCfg&&devSyncCfg.enabled&&!devApplying)scheduleDevPush();
}
// Выбор более свежей копии: если локальные правки новее файла (например, браузер
// перезапустился, файл тихо отвалился, а ты продолжал работать) — файл НЕ затирает их,
// наоборот, локальная версия дописывается в файл. Без штампов — файл главный (как раньше).
function pickFresher(fileData){
  const local=loadLocal();
  if(local&&local.savedAt&&fileData&&fileData.savedAt&&local.savedAt>fileData.savedAt)return{data:local,fromLocal:true};

/* ===================== шифробэкап (Web Crypto, AES-GCM + PBKDF2) ===================== */
async function deriveKey(pass,salt,usage){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:150000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,[usage]);
}
async function encBackup(){
  const pass=prompt('Пароль для шифрования бэкапа (запомни — без него не восстановить):');if(!pass)return;
  try{
    const salt=crypto.getRandomValues(new Uint8Array(16));
    const iv=crypto.getRandomValues(new Uint8Array(12));
    const key=await deriveKey(pass,salt,'encrypt');
    const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(JSON.stringify(state)));
    const out=new Uint8Array(16+12+ct.byteLength);out.set(salt,0);out.set(iv,16);out.set(new Uint8Array(ct),28);
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([out],{type:'application/octet-stream'}));a.download='budget-backup-'+todayStr()+'.enc';a.click();
  }catch(e){alert('Ошибка шифрования: '+e.message);}
}
function decBackup(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.enc';
  inp.onchange=async()=>{
    const f=inp.files[0];if(!f)return;
    const pass=prompt('Пароль от бэкапа:');if(!pass)return;
    try{
      const buf=new Uint8Array(await f.arrayBuffer());
      const salt=buf.slice(0,16),iv=buf.slice(16,28),ct=buf.slice(28);
      const key=await deriveKey(pass,salt,'decrypt');
      const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
      const data=JSON.parse(new TextDecoder().decode(pt));
      if(data&&data.version){if(confirm('Восстановить бюджет из бэкапа? Текущие данные заменятся.')){state=data;migrate();save();render();}}
      else alert('Файл не похож на бэкап бюджета');
    }catch(e){alert('Не удалось расшифровать — неверный пароль или повреждённый файл.');}
  };
  inp.click();
}

const MN_RU={'Январь':1,'Февраль':2,'Март':3,'Апрель':4,'Май':5,'Июнь':6,'Июль':7,'Август':8,'Сентябрь':9,'Октябрь':10,'Ноябрь':11,'Декабрь':12};
function parseCSV(s){const rows=[];let row=[],cur='',q=false;for(let i=0;i<s.length;i++){const c=s[i];if(q){if(c==='"'){if(s[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}else{if(c==='"')q=true;else if(c===','){row.push(cur);cur='';}else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';}else if(c==='\r'){}else cur+=c;}}if(cur!==''||row.length){row.push(cur);rows.push(row);}return rows;}
function sheetIdFromUrl(u){const m=String(u).match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);return m?m[1]:'';}
function gidFromUrl(u){const m=String(u).match(/[?#&]gid=(\d+)/);return m?m[1]:'';}

    const url=`https://docs.google.com/spreadsheets/d/${cfg.sheetId}/export?format=csv&gid=${cfg.gid||0}`;
    const r=await fetch(url,{cache:'no-store'});

  }

/* ===================== синхронизация устройств (приватный репо + шифрование) ===================== */
// Токен и ключ живут ТОЛЬКО здесь (localStorage 'budget-devsync'), не в state —
// не попадают в экспорт/бэкап/файл/публичный код. Данные в репо зашифрованы (AES-GCM).
function loadDevCfg(){try{const c=JSON.parse(localStorage.getItem('budget-devsync'));return c&&c.token&&c.key?c:null;}catch(e){return null;}}
function saveDevCfg(){if(devSyncCfg)localStorage.setItem('budget-devsync',JSON.stringify(devSyncCfg));}
function clearDevCfg(){devSyncCfg=null;localStorage.removeItem('budget-devsync');}
function b64enc(bytes){let s='';const ch=0x8000;for(let i=0;i<bytes.length;i+=ch)s+=String.fromCharCode.apply(null,bytes.subarray(i,i+ch));return btoa(s);}
function b64dec(str){const s=atob(str);const b=new Uint8Array(s.length);for(let i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b;}
async function devKey(){return crypto.subtle.importKey('raw',b64dec(devSyncCfg.key),{name:'AES-GCM'},false,['encrypt','decrypt']);}
async function devEncrypt(){const iv=crypto.getRandomValues(new Uint8Array(12));const k=await devKey();const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,new TextEncoder().encode(JSON.stringify(state)));const out=new Uint8Array(12+ct.byteLength);out.set(iv,0);out.set(new Uint8Array(ct),12);return b64enc(out);}
async function devDecrypt(blob){const raw=b64dec(blob);const iv=raw.slice(0,12),ct=raw.slice(12);const k=await devKey();const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},k,ct);return JSON.parse(new TextDecoder().decode(pt));}
function ghHeaders(){return{'Authorization':'token '+devSyncCfg.token,'Accept':'application/vnd.github+json'};}
function devUrl(){return `https://api.github.com/repos/${devSyncCfg.owner}/${devSyncCfg.repo}/contents/${devSyncCfg.path}`;}
async function ghUser(token){const r=await fetch('https://api.github.com/user',{headers:{'Authorization':'token '+token,'Accept':'application/vnd.github+json'}});if(!r.ok)throw new Error('токен не принят ('+r.status+')');return (await r.json()).login;}
async function ghEnsureRepo(){
  const u=`https://api.github.com/repos/${devSyncCfg.owner}/${devSyncCfg.repo}`;
  let r=await fetch(u,{headers:ghHeaders()});
  if(r.status===404){r=await fetch('https://api.github.com/user/repos',{method:'POST',headers:ghHeaders(),body:JSON.stringify({name:devSyncCfg.repo,private:true,description:'Encrypted budget sync',auto_init:false})});if(!r.ok)throw new Error('не создать репо ('+r.status+')');}
  else if(!r.ok)throw new Error('нет доступа к репо ('+r.status+')');
  else{const j=await r.json();if(j.private===false)throw new Error('репо '+devSyncCfg.repo+' ПУБЛИЧНЫЙ — сделай его приватным и включи синк заново');}
}
function devSet(s){devSyncState=s;updateDevChip();}
async function devPush(retry){
  if(!devSyncCfg||!devSyncCfg.enabled||devApplying)return;
  if(!retry&&devSyncCfg.lastPushSavedAt&&state.savedAt&&state.savedAt<=devSyncCfg.lastPushSavedAt)return; // нет новых правок
  try{
    devSet('sync');
    const blob=await devEncrypt();
    const body={message:'sync '+(state.savedAt||''),content:btoa(blob)};
    if(devSyncCfg.sha)body.sha=devSyncCfg.sha;
    const r=await fetch(devUrl(),{method:'PUT',headers:ghHeaders(),body:JSON.stringify(body)});
    if(r.status===409&&!retry){
      // sha устарел: другое устройство успело запушить. Подтянуть БЕЗ force —
      // чужое применится только если новее; наше не затирается.
      await devPull(false);
      if(devSyncCfg.lastPushSavedAt&&state.savedAt&&state.savedAt<=devSyncCfg.lastPushSavedAt){devSet('ok');return;}
      return devPush(true);
    }
    if(!r.ok)throw new Error('push '+r.status);
    const j=await r.json();devSyncCfg.sha=j.content.sha;devSyncCfg.lastPushSavedAt=state.savedAt;devSyncCfg.lastSync=new Date().toISOString();saveDevCfg();
    devSet('ok');
  }catch(e){devSet('err');}
}
async function devPull(force){
  if(!devSyncCfg||!devSyncCfg.enabled)return;
  try{
    if(!force)devSet('sync');
    const r=await fetch(devUrl()+'?t='+Date.now(),{headers:ghHeaders(),cache:'no-store'});
    if(r.status===404){devSyncCfg.sha=null;saveDevCfg();devSet('ok');return;} // файла нет — сбросить sha
    if(!r.ok)throw new Error('pull '+r.status);
    const j=await r.json();devSyncCfg.sha=j.sha;
    let blob=(j.content||'').replace(/\s/g,'');
    blob=blob?atob(blob):'';
    if(!blob&&j.download_url){blob=(await (await fetch(j.download_url,{cache:'no-store'})).text()).trim();}
    if(!blob){devSet('ok');return;}
    let remote;try{remote=await devDecrypt(blob);}catch(e){devSet('err');return;} // неверный ключ / битый блоб
    if(remote&&remote.version&&(force||!state.savedAt||(remote.savedAt&&remote.savedAt>state.savedAt))){
      devApplying=true;
      state=remote;migrate();
      localStorage.setItem(LS_KEY,JSON.stringify(state));
      if(fileHandle){try{const w=await fileHandle.createWritable();await w.write(JSON.stringify(state,null,2));await w.close();}catch(e){}}
      devSyncCfg.lastPushSavedAt=remote.savedAt;saveDevCfg(); // фиксируем именно remote-штамп
      devApplying=false;
      render();
      // если пользователь успел что-то поправить, пока применялось — допушить
      if(state.savedAt&&devSyncCfg.lastPushSavedAt&&state.savedAt>devSyncCfg.lastPushSavedAt)scheduleDevPush();
    }
    devSyncCfg.lastSync=new Date().toISOString();saveDevCfg();
    devSet('ok');
  }catch(e){devSet('err');}
}
function scheduleDevPush(){clearTimeout(devPushTimer);devPushTimer=setTimeout(()=>devPush(false),1500);}
function startDevLoop(){
  clearInterval(devLoopTimer);
  if(!devSyncCfg||!devSyncCfg.enabled)return;
  devPull(false);
  const sec=Math.max(15,devSyncCfg.intervalSec||30);
  devLoopTimer=setInterval(()=>{if(!document.hidden)devPull(false);},sec*1000);
}
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&devSyncCfg&&devSyncCfg.enabled)devPull(false);});
async function devEnable(token){
  token=(token||'').trim();if(!token){alert('Вставь GitHub-токен (scope repo)');return;}
  try{
    const owner=await ghUser(token);
    const key=b64enc(crypto.getRandomValues(new Uint8Array(32)));

    await devPush(true);   // затем записать текущее
    saveDevCfg();startDevLoop();render();
    alert('Синхронизация включена. Скопируй «код для второго устройства» и вставь его на айфоне.');

}
async function devLink(code){

function secDelta(rows,cur){
  const maxAbs=Math.max(20000,...rows.map(r=>Math.abs(r.dPlan)));
  const avg=rows.reduce((s,r)=>s+r.dPlan,0)/(rows.length||1);
  const cols=rows.map(r=>{
    const h=Math.max(3,Math.abs(r.dPlan)/maxAbs*118);
    const isCur=r.ym===cur;
    const cap=(r.dPlan/1000).toLocaleString('ru-RU',{maximumFractionDigits:1})+'к';
    return `<div class="col ${isCur?'cur':''} ${r.dPlan<0?'negb':''}"><span class="cap num">${cap}</span><div class="bar" style="height:${h.toFixed(0)}px"></div></div>`;
  }).join('');
  const axis=rows.map(r=>`<div class="t ${r.ym===cur?'cur':''}">${M_SH[mIdx(r.ym)]}</div>`).join('');
  const avgBottom=Math.max(3,Math.abs(avg)/maxAbs*118);
  return `<section class="sec">
    <div class="sec-head"><span class="idx">02</span><h2>Дельта по месяцам</h2><span class="sec-note">план, ₽/мес · базовая линия <b>0</b></span></div>
    <div class="delta-strip">
      <div class="bars"><div class="avg-line" style="bottom:${avgBottom.toFixed(0)}px"><span class="avg-tag">ср. ${fmt(avg)}</span></div>${cols}</div>
      <div class="axis">${axis}</div>
    </div>
  </section>`;
}

function whatIfMonth(have,amount,monthlyRub){
  const need=amount-have;

  if(!monthlyRub||monthlyRub<=0)return'никогда при $0';
  const n=Math.ceil(need/monthlyRub);

  return'к '+ymDat(ymAdd(todayYM(),n))+' ('+n+' мес)';
}

  </section>`;
}

/* ===================== bind ===================== */
function bind(rows){
  // register row → select detail month
  sheet.querySelectorAll('table.reg tbody tr').forEach(tr=>tr.addEventListener('click',()=>{detailYM=tr.dataset.ym;render();document.querySelector('.sec-head .navm')?.scrollIntoView({block:'center',behavior:'smooth'});}));

  // currency toggle
  sheet.querySelector('#curTog')?.addEventListener('click',()=>{state.settings.showUsd=!state.settings.showUsd;save();render();});

  // month nav
  const H=horizon();
  sheet.querySelector('#pM')?.addEventListener('click',e=>{e.stopPropagation();const i=H.indexOf(detailYM);if(i>0){detailYM=H[i-1];render();}});
  sheet.querySelector('#nM')?.addEventListener('click',e=>{e.stopPropagation();const i=H.indexOf(detailYM);if(i<H.length-1){detailYM=H[i+1];render();}});
  sheet.querySelector('.resetm')?.addEventListener('click',()=>{
    const m=state.months[detailYM];
    if(m&&m.locked){m.locked=false;save();render();return;}
    if(confirm('Сбросить месяц к шаблону? Введённые факты и закрытия удалятся.')){delete state.months[detailYM];save();render();}
  });
  sheet.querySelector('#closeMonth')?.addEventListener('click',()=>{
    const t=totals(detailYM);
    if(!t.hasFact){if(!confirm('В месяце ещё нет ни факта дохода, ни закрытых категорий. Всё равно закрыть?'))return;}
    const m=matM(detailYM);m.locked=true;save();render();
  });

  // income fact (single field)
  const isLocked=()=>{const mm=state.months[detailYM];return !!(mm&&mm.locked);};
  sheet.querySelector('#incFact')?.addEventListener('change',e=>{if(isLocked())return;matM(detailYM).incomeFact=parseNum(e.target.value);save();render();});

  // categories
  sheet.querySelectorAll('.cat[data-eid]').forEach(el=>{
    el.addEventListener('change',e=>{if(isLocked())return;const r=matM(detailYM).expenses.find(x=>x.id===el.dataset.eid);if(!r)return;const f=e.target.dataset.f;if(f==='name')r.name=e.target.value;else r[f]=parseNum(e.target.value);save();render();});
    el.addEventListener('click',e=>{const btn=e.target.closest('[data-act]');if(!btn)return;const mm=matM(detailYM);if(mm.locked)return;const r=mm.expenses.find(x=>x.id===el.dataset.eid);if(!r)return;
      if(btn.dataset.act==='toggle'){if(r.closed){r.closed=false;r.closedDate=null;}else{r.closed=true;r.closedDate=todayStr();if(r.fact==null)r.fact=r.plan;}save();render();}
      if(btn.dataset.act==='edel'){if(confirm('Удалить категорию из этого месяца?')){mm.expenses=mm.expenses.filter(x=>x.id!==r.id);save();render();}}
    });
  });
  sheet.querySelector('#addCat')?.addEventListener('click',()=>{const mm=matM(detailYM);if(mm.locked)return;const nm=sheet.querySelector('#newCatName').value.trim();const am=parseNum(sheet.querySelector('#newCatAmt').value)||0;if(!nm){sheet.querySelector('#newCatName').focus();return;}mm.expenses.push({id:uid(),name:nm,plan:am,fact:null,closed:false,closedDate:null});save();render();});
  sheet.querySelector('#newCatAmt')?.addEventListener('keydown',e=>{if(e.key==='Enter')sheet.querySelector('#addCat').click();});

  // journal reopen
  sheet.querySelectorAll('.ledger .entry[data-eid]').forEach(el=>{
    el.querySelector('[data-act=reopen]')?.addEventListener('click',()=>{const mm=matM(detailYM);if(mm.locked)return;const r=mm.expenses.find(x=>x.id===el.dataset.eid);if(r){r.closed=false;r.closedDate=null;save();render();}});
  });

  // goals
  sheet.querySelectorAll('.goal[data-gid]').forEach(el=>{
    el.addEventListener('click',e=>{const btn=e.target.closest('[data-act]');if(!btn)return;const g=state.goals.find(x=>x.id===el.dataset.gid);if(!g)return;
      if(btn.dataset.act==='gdel'){if(confirm('Удалить цель?')){state.goals=state.goals.filter(x=>x.id!==g.id);save();render();}}
      if(btn.dataset.act==='gbuy'){const v=parseNum(prompt('Сколько фактически потрачено, ₽:',g.saved||g.amount));if(v!=null){g.done=true;g.spent=v;save();render();}}
      if(btn.dataset.act==='gedit'){const name=prompt('Название:',g.name);if(name===null)return;const amount=parseNum(prompt('Сумма ₽:',g.amount));if(amount==null)return;if(amount<=0){alert('Нужна положительная сумма');return;}const tm=prompt('Целевой месяц (ГГГГ-ММ):',g.targetMonth||'');g.name=name||g.name;g.amount=amount;if(tm&&/^\d{4}-\d{2}$/.test(tm))g.targetMonth=tm;save();render();}
      if(btn.dataset.act==='gup'||btn.dataset.act==='gdown'){reprioritize(g.id,btn.dataset.act==='gup'?-1:1);}
      // ручное распределение пула
      if(btn.dataset.act==='galloc'||btn.dataset.act==='gallocall'||btn.dataset.act==='gdealloc'){
        const inp=el.querySelector('.aival');const raw=parseNum(inp?inp.value:'')||0;
        if(btn.dataset.act==='gallocall'){const add=Math.max(0,poolFree());if(add<=0){alert('В пуле нет свободных денег.');return;}g.saved=(g.saved||0)+add;save();render();}
        else if(btn.dataset.act==='galloc'){const add=Math.min(raw,poolFree());if(raw<=0){alert('Впиши сумму слева.');return;}if(add<=0){alert('В пуле нет свободных денег.');return;}g.saved=(g.saved||0)+add;if(add<raw)alert('В пуле было только '+fmt(add)+' ₽ — отложил столько.');save();render();}
        else if(btn.dataset.act==='gdealloc'){const back=Math.min(raw>0?raw:(g.saved||0),g.saved||0);if(back<=0){alert('На этой цели ничего не отложено.');return;}g.saved=(g.saved||0)-back;save();render();}
      }
    });
    // what-if live recompute
    const wi=el.querySelector('.whatif');
    wi?.querySelector('.wibonus')?.addEventListener('input',e=>{
      const amount=Number(wi.dataset.amount),have=Number(wi.dataset.have);
      const b=parseNum(e.target.value)||0;const rate=state.settings.planRate||78;
      wi.querySelector('.res').textContent=whatIfMonth(have,amount,b*rate);
    });
  });
  sheet.querySelectorAll('.goal-done[data-gid] [data-act=gdel]').forEach(b=>b.addEventListener('click',()=>{const gid=b.closest('[data-gid]').dataset.gid;if(confirm('Удалить из списка?')){state.goals=state.goals.filter(x=>x.id!==gid);save();render();}}));
  sheet.querySelector('#gAdd')?.addEventListener('click',()=>{const name=sheet.querySelector('#gName').value.trim();const amount=parseNum(sheet.querySelector('#gAmt').value);const tm=sheet.querySelector('#gMonth').value;if(!name||!amount){alert('Нужны название и сумма');return;}const maxP=state.goals.reduce((m,g)=>Math.max(m,g.priority||0),0);state.goals.push({id:uid(),name,amount,targetMonth:tm,done:false,spent:0,saved:0,priority:maxP+1});save();render();});

  // sinking funds
  sheet.querySelectorAll('.sfund[data-sfid]').forEach(el=>{
    el.addEventListener('change',e=>{const f=state.sinkingFunds.find(x=>x.id===el.dataset.sfid);if(!f)return;const k=e.target.dataset.f;if(!k)return;if(k==='name')f.name=e.target.value;else f[k]=parseNum(e.target.value)||0;save();render();});
    el.addEventListener('click',e=>{const btn=e.target.closest('[data-act]');if(!btn)return;const f=state.sinkingFunds.find(x=>x.id===el.dataset.sfid);if(!f)return;
      if(btn.dataset.act==='sfmo'){f.balance=(f.balance||0)+(f.monthly||0);save();render();}
      if(btn.dataset.act==='sfspend'){const v=parseNum(prompt('Сколько потрачено из конверта «'+f.name+'», ₽:',f.balance||0));if(v!=null){f.balance=Math.max(0,(f.balance||0)-v);save();render();}}
      if(btn.dataset.act==='sfdel'){if(confirm('Удалить конверт?')){state.sinkingFunds=state.sinkingFunds.filter(x=>x.id!==f.id);save();render();}}
    });
  });
  sheet.querySelector('#sfAdd')?.addEventListener('click',()=>{const nm=sheet.querySelector('#sfName').value.trim();const mo=parseNum(sheet.querySelector('#sfMo').value)||0;if(!nm){sheet.querySelector('#sfName').focus();return;}state.sinkingFunds.push({id:uid(),name:nm,monthly:mo,balance:0});save();render();});

  // bonuses
  sheet.querySelectorAll('.inc[data-bid]').forEach(el=>{
    el.addEventListener('change',e=>{const b=state.bonuses.find(x=>x.id===el.dataset.bid);if(!b)return;const f=e.target.dataset.f;if(f==='note')b.note=e.target.value;else if(f==='dateM'){if(/^\d{4}-\d{2}$/.test(e.target.value))b.date=e.target.value+'-15';}else b[f]=parseNum(e.target.value);save();render();});
    el.addEventListener('click',async e=>{const btn=e.target.closest('button');if(!btn)return;const b=state.bonuses.find(x=>x.id===el.dataset.bid);if(!b)return;
      if(btn.dataset.act==='bdel'){if(confirm('Удалить бонус?')){state.bonuses=state.bonuses.filter(x=>x.id!==b.id);save();render();}}
      if(btn.dataset.act==='bcbr'){btn.textContent='…';try{b.rate=await fetchCbr(b.date);save();render();}catch(err){btn.textContent='ЦБ';alert('Нет курса ЦБ');}}
    });
  });
  sheet.querySelector('#addBonus')?.addEventListener('click',()=>{state.bonuses.push({id:uid(),date:detailYM+'-15',usd:null,rate:null,rub:null,note:''});save();render();});

  // settings
  bindSettings();
}

function reprioritize(gid,dir){
  const list=sortedGoals();
  const i=list.findIndex(g=>g.id===gid);
  const j=i+dir;
  if(i<0||j<0||j>=list.length)return;
  const a=list[i],b=list[j];
  const pa=a.priority,pb=b.priority;
  a.priority=pb;b.priority=pa;
  // нормализуем на случай равных приоритетов
  sortedGoals().forEach((g,k)=>g.priority=k+1);
  save();render();
}

function bindSettings(){
  const s=state.settings;

  on('#fNew','click',()=>connectFile(true));
  on('#fOff','click',disconnectFile);
  on('#fExp','click',exportJSON);
  on('#fImp','click',importJSON);
  on('#fEnc','click',encBackup);
  on('#fDec','click',decBackup);
  on('#sIncPlan','change',e=>{const v=parseNum(e.target.value);if(v!=null){s.incomePlan=v;save();render();}});
  on('#sRate','change',e=>{const v=parseNum(e.target.value);if(v){s.planRate=v;save();render();}});
  on('#sRateCbr','click',async e=>{e.target.textContent='…';try{s.planRate=await fetchCbr();save();render();}catch(err){alert('Нет ЦБ');}});
  on('#sCons','change',e=>{const v=parseNum(e.target.value);if(v!=null){s.bonusCons=v;save();render();}});
  on('#sAvg','change',e=>{const v=parseNum(e.target.value);if(v!=null){s.bonusAvg=v;save();render();}});
  on('#sApplyStats','click',()=>{const st=bonusStats();if(!st){alert('Нет истории бонусов');return;}s.bonusCons=Math.round(st.median);s.bonusAvg=Math.round(st.mean);save();render();});
  on('#sShowUsd','change',e=>{s.showUsd=e.target.checked;save();render();});
  // синхронизация устройств
  on('#devEnable','click',()=>devEnable(sheet.querySelector('#devToken').value));
  on('#devLink','click',()=>devLink(sheet.querySelector('#devLinkCode').value));
  on('#devCopy','click',()=>{try{navigator.clipboard.writeText(devCode());}catch(e){const t=sheet.querySelector('#devCodeF');if(t){t.value=devCode();t.select();document.execCommand('copy');t.value='•••••••••••••••••••• скрыт';}}const b=sheet.querySelector('#devCopy');const o=b.textContent;b.textContent='скопировано ✓';setTimeout(()=>{b.textContent=o;},1300);});
  on('#devPullNow','click',()=>devPull(true));
  on('#devOff','click',()=>{if(confirm('Отключить синхронизацию на этом устройстве? Зашифрованные данные в репозитории останутся, но перестанут синкаться сюда.'))devDisable();});
  // accounts
  on('#acctAdd','click',()=>{state.accounts.push({id:uid(),name:'Новый счёт',cur:'RUB',balance:0});save();render();});
  sheet.querySelectorAll('.acct[data-aid]').forEach(el=>{
    el.addEventListener('change',e=>{const a=state.accounts.find(x=>x.id===el.dataset.aid);if(!a)return;const f=e.target.dataset.f;if(f==='name')a.name=e.target.value;else if(f==='cur')a.cur=e.target.value;else a[f]=parseNum(e.target.value)||0;save();render();});
    el.querySelector('[data-act=adel]')?.addEventListener('click',()=>{if(confirm('Удалить счёт?')){state.accounts=state.accounts.filter(x=>x.id!==el.dataset.aid);save();render();}});
  });
  // bonus sync config
  on('#bsSave','click',()=>{
    const url=sheet.querySelector('#bsUrl').value.trim();
    const en=sheet.querySelector('#bsEnabled').checked;
    const yb=parseNum(sheet.querySelector('#bsYear').value)||new Date().getFullYear();
    const iv=parseNum(sheet.querySelector('#bsInt').value)||60;
    const id=sheetIdFromUrl(url)||state.bonusSync.sheetId;
    const gid=gidFromUrl(url)||state.bonusSync.gid||'0';
    state.bonusSync={enabled:en,sheetId:id,gid:gid,yearBase:Math.round(yb),intervalSec:Math.round(iv),lastSync:state.bonusSync.lastSync};
    save();
    if(en&&id){startSyncLoop();} else {clearInterval(syncTimer);render();}
  });
  on('#bsNow','click',()=>syncBonuses(true));
  on('#bsEnabled','change',e=>{state.bonusSync.enabled=e.target.checked;save();if(e.target.checked)startSyncLoop();else{clearInterval(syncTimer);render();}});
  on('#sStart','change',e=>{if(/^\d{4}-\d{2}$/.test(e.target.value)){s.horizonStart=e.target.value;save();render();}});
  on('#sHor','change',e=>{const v=parseNum(e.target.value);if(v>=1&&v<=36){s.horizonMonths=Math.round(v);save();render();}});
  on('#tExpAdd','click',()=>{state.template.expenses.push({id:uid(),name:'Новая категория',amount:0});save();render();});
  sheet.querySelectorAll('.tpl[data-tid]').forEach(el=>{
    el.addEventListener('change',e=>{const t=state.template.expenses.find(x=>x.id===el.dataset.tid);if(!t)return;const f=e.target.dataset.f;if(f==='name')t[f]=e.target.value;else t[f]=parseNum(e.target.value);save();render();});
    el.querySelector('[data-act=tdel]')?.addEventListener('click',()=>{if(confirm('Удалить из шаблона?')){const i=state.template.expenses.findIndex(x=>x.id===el.dataset.tid);if(i>=0)state.template.expenses.splice(i,1);save();render();}});
  });
  // keep settings open across re-render
  const det=sheet.querySelector('#settings');if(det&&window.__setOpen)det.open=true;
  det?.addEventListener('toggle',()=>{window.__setOpen=det.open;});
}

function updateChips(){
  const c=sheet.querySelector('#cbrChip');if(c)c.innerHTML=`<span class="dot"></span>ЦБ ${cbrNow?'<b>'+cbrNow.toFixed(2)+' ₽</b>':'…'}`;
  const sc=sheet.querySelector('#saveChip');if(sc){sc.className='mchip '+(saveMode==='file'?'ok':saveMode==='saving'?'warn':fileHandle?'ok':'warn');sc.innerHTML=`<span class="dot"></span>${saveMode==='saving'?'сохраняю…':fileHandle?'data.json':'браузер'}`;}
  updateSyncChip();
  updateDevChip();
}

/* ===================== init ===================== */
if(location.protocol==='https:'){
  const ml=document.createElement('link');ml.rel='manifest';ml.href='manifest.webmanifest';document.head.appendChild(ml);
  if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
window.addEventListener('beforeunload',()=>{localStorage.setItem(LS_KEY,JSON.stringify(state));});
render();
restoreHandle();
startSyncLoop();
startDevLoop();
fetchCbr().then(r=>{cbrNow=r;updateChips();if(showUsd())render();}).catch(()=>{cbrNow=null;const c=sheet.querySelector('#cbrChip');if(c)c.innerHTML='<span class="dot"></span>ЦБ офлайн';});
</script>
</body>
</html>
