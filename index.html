<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бюджет — доходы и расходы</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>₽</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1220; --surface:#111C33; --surface2:#16233E; --surface3:#1B2B4A;
  --border:rgba(255,255,255,.08); --border2:rgba(255,255,255,.14);
  --ink:#F1F5F9; --ink2:#94A3B8; --muted:#64748B;
  --accent:#3B82F6; --accent-deep:#1E40AF;
  --pos:#0DA06E; --pos-text:#34D399; --neg:#E56262; --neg-text:#F87171;
  --warn:#FBBF24; --grid:rgba(255,255,255,.06);
  --sans:'Fira Sans',system-ui,-apple-system,sans-serif;
  --mono:'Fira Code',ui-monospace,'SF Mono',monospace;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:dark}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(1200px 500px at 70% -10%,rgba(30,64,175,.18),transparent 60%);pointer-events:none}
.wrap{max-width:1080px;margin:0 auto;padding:24px 20px 80px;position:relative}
/* header */
header{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.logo{display:flex;align-items:baseline;gap:10px}
.logo h1{font-size:20px;font-weight:600;letter-spacing:-.02em}
.logo .yr{font-family:var(--mono);color:var(--ink2);font-size:13px}
.spacer{flex:1}
.chip{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border:1px solid var(--border);border-radius:99px;font-size:12.5px;color:var(--ink2);background:var(--surface)}
.chip .dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
.chip.ok .dot{background:var(--pos-text)}
.chip.warn .dot{background:var(--warn)}
.chip b{color:var(--ink);font-family:var(--mono);font-weight:500}
/* tabs */
nav{display:flex;gap:4px;border:1px solid var(--border);background:var(--surface);border-radius:12px;padding:4px;width:max-content;margin-bottom:24px}
nav button{appearance:none;border:0;background:transparent;color:var(--ink2);font:inherit;font-size:14px;font-weight:500;padding:7px 16px;border-radius:8px;cursor:pointer;transition:all .18s}
nav button:hover{color:var(--ink)}
nav button.on{background:var(--accent-deep);color:#fff}
/* cards & layout */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.card .lbl{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.card .val{font-family:var(--mono);font-size:22px;font-weight:600;letter-spacing:-.01em}
.card .sub{font-size:12.5px;color:var(--ink2);margin-top:4px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:20px}
.panel h2{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.panel h2 .note{font-size:12.5px;font-weight:400;color:var(--muted)}
/* tables */
.tblwrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th{font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:500;text-align:right;padding:8px 10px;border-bottom:1px solid var(--border2);white-space:nowrap}
th:first-child,td:first-child{text-align:left}
td{padding:9px 10px;border-bottom:1px solid var(--grid);text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:13.5px;white-space:nowrap}
td:first-child{font-family:var(--sans);font-size:14px}
tr.cur td{background:rgba(59,130,246,.07)}
tr.dim td{color:var(--muted)}
tr.total td{border-top:1px solid var(--border2);border-bottom:0;font-weight:600;color:var(--ink)}
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:rgba(255,255,255,.03)}
.pos{color:var(--pos-text)} .neg{color:var(--neg-text)} .mut{color:var(--muted)}
/* inputs */
input[type=text],input[type=month],select{background:var(--surface2);border:1px solid var(--border);color:var(--ink);font-family:var(--mono);font-size:13.5px;padding:6px 9px;border-radius:7px;width:110px;text-align:right;transition:border .15s}
input[type=text]:focus,select:focus{outline:none;border-color:var(--accent)}
input.wide{width:100%;text-align:left;font-family:var(--sans)}
td input.wide{min-width:170px}
input::placeholder{color:var(--muted)}
select{text-align:left;width:auto;cursor:pointer;font-family:var(--sans)}
button.btn{appearance:none;border:1px solid var(--border2);background:var(--surface2);color:var(--ink);font:inherit;font-size:13.5px;font-weight:500;padding:7px 14px;border-radius:8px;cursor:pointer;transition:all .15s}
button.btn:hover{background:var(--surface3);border-color:var(--accent)}
button.btn.primary{background:var(--accent-deep);border-color:transparent;color:#fff}
button.btn.primary:hover{background:#2563EB}
button.btn.sm{padding:4px 10px;font-size:12.5px}
button.icon{appearance:none;border:0;background:transparent;color:var(--muted);cursor:pointer;font-size:15px;padding:2px 6px;border-radius:6px}
button.icon:hover{color:var(--neg-text);background:rgba(229,98,98,.1)}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.row+.row{margin-top:10px}
label.f{font-size:13px;color:var(--ink2)}
/* chart */
.chart{position:relative}
.chart svg{display:block;width:100%;height:auto}
.tip{position:fixed;z-index:10;background:var(--surface3);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:12.5px;pointer-events:none;opacity:0;transition:opacity .12s;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.tip b{font-family:var(--mono);font-weight:600}
/* goals */
.goal{border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;background:var(--surface2)}
.goal .top{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.goal .name{font-weight:600;font-size:15px}
.goal .meta{font-size:12.5px;color:var(--ink2)}
.meter{height:8px;border-radius:99px;background:var(--surface3);overflow:hidden;margin:8px 0 6px}
.meter i{display:block;height:100%;border-radius:99px;background:var(--accent);transition:width .4s ease}
.badge{display:inline-block;font-size:12px;padding:3px 10px;border-radius:99px;font-weight:500}
.badge.ok{background:rgba(13,160,110,.15);color:var(--pos-text)}
.badge.mid{background:rgba(251,191,36,.13);color:var(--warn)}
.badge.bad{background:rgba(229,98,98,.13);color:var(--neg-text)}
.badge.done{background:rgba(148,163,184,.15);color:var(--ink2)}
.empty{color:var(--muted);font-size:14px;padding:12px 0}
.hint{font-size:12.5px;color:var(--muted);line-height:1.55;margin-top:10px}
.monthnav{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.monthnav .mname{font-size:17px;font-weight:600;min-width:170px;text-align:center;text-transform:capitalize}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:860px){.grid2{grid-template-columns:1fr}}
.savebar{position:fixed;bottom:18px;right:18px;z-index:5}
::selection{background:rgba(59,130,246,.35)}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"><h1>Бюджет</h1><span class="yr" id="hdrRange"></span></div>
    <div class="spacer"></div>
    <span class="chip" id="cbrChip"><span class="dot"></span>ЦБ&nbsp;<b id="cbrNow">…</b></span>
    <span class="chip" id="saveChip"><span class="dot"></span><span id="saveTxt">локально</span></span>
  </header>
  <nav id="tabs">
    <button data-tab="year" class="on">Год</button>
    <button data-tab="month">Месяц</button>
    <button data-tab="goals">Цели и пул</button>
    <button data-tab="settings">Настройки</button>
  </nav>
  <main id="view"></main>
</div>
<div class="tip" id="tip"></div>

<script>
/* ============ state ============ */
const LS_KEY='budget-omp-v1';
const MONTH_NAMES=['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
const MONTH_SHORT=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const MONTH_DAT=['январю','февралю','марту','апрелю','маю','июню','июлю','августу','сентябрю','октябрю','ноябрю','декабрю'];
function ymDat(ym){const[y,m]=ym.split('-').map(Number);return MONTH_DAT[m-1]+' '+y;}
const uid=()=> 'x'+Math.random().toString(36).slice(2,9);

function defaultState(){return {
  version:1,
  settings:{planRate:78, horizonStart:'2026-07', horizonMonths:12, bonusCons:300, bonusAvg:1000},
  template:{
    incomes:[
      {id:'i1',name:'ЗП 5-го — рублёвая часть',day:5,cur:'RUB',amount:60000},
      {id:'i2',name:'ЗП 5-го — крипта',day:5,cur:'USD',amount:2000},
      {id:'i3',name:'ЗП 20-го',day:20,cur:'RUB',amount:40000},
    ],
    expenses:[
      {id:'e1',name:'Ипотека',amount:27300},
      {id:'e2',name:'Ozon',amount:5000},
      {id:'e3',name:'Зал',amount:3000},
      {id:'e4',name:'Питание (дом + вне дома)',amount:70000},
      {id:'e5',name:'Медицина',amount:30000},
      {id:'e6',name:'Телефон, VPN, Wi-Fi',amount:3350},
      {id:'e7',name:'Красота',amount:10000},
      {id:'e8',name:'Авто',amount:10000},
      {id:'e9',name:'Теннис',amount:7000},
      {id:'e10',name:'Нижний',amount:10000},
      {id:'e11',name:'Помощь отцу',amount:10000},
    ]
  },
  months:{
    '2026-07':{
      incomes:[
        {id:uid(),tplId:'i1',name:'ЗП 5-го — рублёвая часть',day:5,cur:'RUB',plan:60000,fact:34000,rate:null},
        {id:uid(),tplId:'i2',name:'ЗП 5-го — крипта',day:5,cur:'USD',plan:2000,fact:2130,rate:78.31},
        {id:uid(),tplId:'i3',name:'ЗП 20-го',day:20,cur:'RUB',plan:40000,fact:null,rate:null},
      ],
      expenses:[
        {id:uid(),tplId:'e1',name:'Ипотека',plan:27300,fact:null},
        {id:uid(),tplId:'e2',name:'Ozon',plan:5000,fact:null},
        {id:uid(),tplId:'e3',name:'Зал',plan:3000,fact:null},
        {id:uid(),tplId:'e4',name:'Питание (дом + вне дома)',plan:70000,fact:null},
        {id:uid(),tplId:'e5',name:'Медицина',plan:30000,fact:null},
        {id:uid(),tplId:'e6',name:'Телефон, VPN, Wi-Fi',plan:3350,fact:null},
        {id:uid(),tplId:'e7',name:'Красота',plan:10000,fact:null},
        {id:uid(),tplId:'e8',name:'Авто',plan:10000,fact:null},
        {id:uid(),tplId:'e9',name:'Теннис',plan:7000,fact:null},
        {id:uid(),tplId:'e10',name:'Нижний',plan:10000,fact:null},
        {id:uid(),tplId:'e11',name:'Помощь отцу',plan:10000,fact:null},
      ]
    }
  },
  bonuses:[],
  goals:[]
};}

let state = loadLocal() || defaultState();
let activeTab='year';
let curYM = todayYM();

/* ============ helpers ============ */
function todayYM(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function todayStr(){const d=new Date();return d.toISOString().slice(0,10);}
function ymAdd(ym,n){let[y,m]=ym.split('-').map(Number);m+=n;y+=Math.floor((m-1)/12);m=((m-1)%12+12)%12+1;return y+'-'+String(m).padStart(2,'0');}
function ymDiff(a,b){const[ya,ma]=a.split('-').map(Number),[yb,mb]=b.split('-').map(Number);return (yb-ya)*12+(mb-ma);}
function ymLabel(ym,short){const[y,m]=ym.split('-').map(Number);return (short?MONTH_SHORT[m-1]:MONTH_NAMES[m-1])+(short?' ’'+String(y).slice(2):' '+y);}
function horizon(){const s=state.settings;return Array.from({length:s.horizonMonths},(_,i)=>ymAdd(s.horizonStart,i));}
function fmt(n,sign){if(n==null||isNaN(n))return '—';const s=new Intl.NumberFormat('ru-RU',{maximumFractionDigits:0}).format(Math.round(n));return (sign&&n>0?'+':'')+s;}
function fmtR(n,sign){return n==null||isNaN(n)?'—':fmt(n,sign)+' ₽';}
function parseNum(v){if(v==null)return null;const s=String(v).replace(/\s|₽| /g,'').replace(',','.');if(s==='')return null;const n=Number(s);return isNaN(n)?null:n;}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function monthFromTemplate(){return {
  incomes:state.template.incomes.map(t=>({id:uid(),tplId:t.id,name:t.name,day:t.day,cur:t.cur,plan:t.amount,fact:null,rate:null})),
  expenses:state.template.expenses.map(t=>({id:uid(),tplId:t.id,name:t.name,plan:t.amount,fact:null})),
};}
function ensureMonth(ym){if(!state.months[ym])state.months[ym]=monthFromTemplate();return state.months[ym];}
function getMonth(ym){return state.months[ym]||monthFromTemplate();}

function incPlanRub(r){return r.cur==='USD'?(r.plan||0)*state.settings.planRate:(r.plan||0);}
function incFactRub(r){if(r.fact==null)return null;return r.cur==='USD'?r.fact*(r.rate||state.settings.planRate):r.fact;}
function bonusRub(b){return b.rub!=null?b.rub:(b.usd!=null?b.usd*(b.rate||state.settings.planRate):0);}

function monthTotals(ym){return totalsOf(getMonth(ym));}
function totalsOf(m){
  const ip=m.incomes.reduce((s,r)=>s+incPlanRub(r),0);
  const facts=m.incomes.map(incFactRub).filter(v=>v!=null);
  const if_=facts.length?facts.reduce((a,b)=>a+b,0):null;
  const ep=m.expenses.reduce((s,r)=>s+(r.plan||0),0);
  const efacts=m.expenses.map(r=>r.fact).filter(v=>v!=null);
  const ef=efacts.length?efacts.reduce((a,b)=>a+b,0):null;
  const hasFacts=facts.length>0||efacts.length>0;
  // «рабочая» дельта: факт где есть, план где нет
  const mixInc=m.incomes.reduce((s,r)=>s+(incFactRub(r)??incPlanRub(r)),0);
  const mixExp=m.expenses.reduce((s,r)=>s+((r.fact!=null?r.fact:r.plan)||0),0);
  return {ip,if_:if_,ep,ef,hasFacts,dPlan:ip-ep,dMix:mixInc-mixExp};
}
function poolBalance(){
  const inn=state.bonuses.reduce((s,b)=>s+bonusRub(b),0);
  const out=state.goals.filter(g=>g.done).reduce((s,g)=>s+(g.spent||0),0);
  return inn-out;
}

/* ============ persistence ============ */
function loadLocal(){try{const s=JSON.parse(localStorage.getItem(LS_KEY));return s&&s.version?s:null;}catch(e){return null;}}
let fileHandle=null, saveTimer=null;
const idb={
  db(){return new Promise((res,rej)=>{const r=indexedDB.open('budget-fsa',1);r.onupgradeneeded=()=>r.result.createObjectStore('kv');r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});},
  async get(k){const d=await this.db();return new Promise(res=>{const t=d.transaction('kv').objectStore('kv').get(k);t.onsuccess=()=>res(t.result);t.onerror=()=>res(null);});},
  async set(k,v){const d=await this.db();return new Promise(res=>{const t=d.transaction('kv','readwrite');t.objectStore('kv').put(v,k);t.oncomplete=()=>res();});},
  async del(k){const d=await this.db();return new Promise(res=>{const t=d.transaction('kv','readwrite');t.objectStore('kv').delete(k);t.oncomplete=()=>res();});}
};
function setSaveChip(mode){
  const chip=document.getElementById('saveChip'),txt=document.getElementById('saveTxt');
  chip.className='chip '+(mode==='file'?'ok':'warn');
  txt.textContent=mode==='file'?'data.json':(mode==='saving'?'сохраняю…':'локально (браузер)');
}
function save(){
  localStorage.setItem(LS_KEY,JSON.stringify(state));
  if(fileHandle){
    setSaveChip('saving');
    clearTimeout(saveTimer);
    saveTimer=setTimeout(async()=>{
      try{
        const w=await fileHandle.createWritable();
        await w.write(JSON.stringify(state,null,2));
        await w.close();
        setSaveChip('file');
      }catch(e){console.warn('file save failed',e);setSaveChip('local');}
    },500);
  }
}
async function restoreHandle(){
  if(!('showOpenFilePicker'in window))return;
  try{
    const h=await idb.get('handle');
    if(!h)return;
    let p=await h.queryPermission({mode:'readwrite'});
    if(p==='prompt')p=await h.requestPermission({mode:'readwrite'});
    if(p!=='granted')return;
    fileHandle=h;
    const f=await h.getFile();
    const text=await f.text();
    if(text.trim()){
      const data=JSON.parse(text);
      if(data&&data.version){state=data;localStorage.setItem(LS_KEY,JSON.stringify(state));}
    }
    setSaveChip('file');render();
  }catch(e){console.warn('restore failed',e);}
}
async function connectFile(create){
  try{
    let h;
    if(create){h=await window.showSaveFilePicker({suggestedName:'data.json',types:[{description:'JSON',accept:{'application/json':['.json']}}]});}
    else{[h]=await window.showOpenFilePicker({types:[{description:'JSON',accept:{'application/json':['.json']}}]});}
    await h.requestPermission({mode:'readwrite'});
    fileHandle=h;await idb.set('handle',h);
    if(!create){
      const f=await h.getFile();const text=await f.text();
      if(text.trim()){
        try{const data=JSON.parse(text);if(data&&data.version){state=data;}}catch(e){}
      }
    }
    save();render();
  }catch(e){/* cancelled */}
}
async function disconnectFile(){fileHandle=null;await idb.del('handle');setSaveChip('local');render();}
function exportJSON(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));
  a.download='budget-export-'+todayStr()+'.json';a.click();
}
function importJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=async()=>{
    const f=inp.files[0];if(!f)return;
    try{const data=JSON.parse(await f.text());if(data&&data.version){state=data;save();render();}else alert('Файл не похож на данные бюджета');}
    catch(e){alert('Не удалось прочитать JSON');}
  };
  inp.click();
}

/* ============ ЦБ ============ */
const rateCache={};
async function fetchCbr(dateStr){
  const key=dateStr||'now';
  if(rateCache[key])return rateCache[key];
  let rate;
  if(!dateStr||dateStr>=todayStr()){
    const j=await(await fetch('https://www.cbr-xml-daily.ru/daily_json.js')).json();
    rate=j.Valute.USD.Value;
  }else{
    let d=new Date(dateStr+'T12:00:00');
    for(let i=0;i<10;i++){
      const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
      try{
        const r=await fetch(`https://www.cbr-xml-daily.ru/archive/${y}/${m}/${dd}/daily_json.js`);
        if(r.ok){const j=await r.json();rate=j.Valute.USD.Value;break;}
      }catch(e){}
      d.setDate(d.getDate()-1);
    }
    if(!rate)throw new Error('нет данных ЦБ');
  }
  rate=Math.round(rate*100)/100;
  rateCache[key]=rate;
  return rate;
}

/* ============ views ============ */
const view=document.getElementById('view');
function render(){
  document.getElementById('hdrRange').textContent=ymLabel(state.settings.horizonStart,true)+' — '+ymLabel(ymAdd(state.settings.horizonStart,state.settings.horizonMonths-1),true);
  ({year:renderYear,month:renderMonth,goals:renderGoals,settings:renderSettings})[activeTab]();
}

/* ---- ГОД ---- */
function renderYear(){
  const H=horizon();
  let cum=0;
  const rows=H.map(ym=>{const t=monthTotals(ym);cum+=t.dMix;return{ym,...t,cum};});
  const factInc=rows.reduce((s,r)=>s+(r.if_||0),0);
  const factExp=rows.reduce((s,r)=>s+(r.ef||0),0);
  const endCum=rows[rows.length-1].cum;
  const pool=poolBalance();

  view.innerHTML=`
  <div class="cards">
    <div class="card"><div class="lbl">Доходы · факт</div><div class="val">${fmtR(factInc)}</div><div class="sub">регулярные, за горизонт</div></div>
    <div class="card"><div class="lbl">Расходы · факт</div><div class="val">${fmtR(factExp)}</div><div class="sub">за горизонт</div></div>

function deltaChartSVG(rows){
  const W=980,H=210,padL=8,padR=8,padT=26,padB=26;
  const iw=(W-padL-padR)/rows.length;
  const maxAbs=Math.max(20000,...rows.map(r=>Math.abs(r.dMix)));
  const zero=padT+(H-padT-padB)*(maxAbs/(maxAbs*2));
  const scale=(H-padT-padB)/(maxAbs*2);
  let bars='';
  rows.forEach((r,i)=>{
    const bw=Math.min(44,iw*.55);
    const x=padL+i*iw+(iw-bw)/2;
    const h=Math.max(2,Math.abs(r.dMix)*scale);
    const y=r.dMix>=0?zero-h:zero;
    const c=r.dMix>=0?'var(--pos)':'var(--neg)';
    const rx=4;
    bars+=`<rect class="bar" data-i="${i}" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="${rx}" fill="${c}" opacity="${r.hasFacts?1:.45}"></rect>`;
    bars+=`<text x="${(padL+i*iw+iw/2).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="11" fill="var(--muted)" font-family="var(--mono)">${ymLabel(r.ym,true).split(' ')[0]}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" data-rows='${esc(JSON.stringify(rows.map(r=>({ym:r.ym,d:Math.round(r.dMix),f:r.hasFacts}))))}'>
    <line x1="${padL}" y1="${zero}" x2="${W-padR}" y2="${zero}" stroke="var(--border2)" stroke-width="1"/>
    ${bars}
  </svg>`;
}
function bindChartTips(){
  const tip=document.getElementById('tip');
  const svg=view.querySelector('.chart svg');
  if(!svg)return;
  const rows=JSON.parse(svg.dataset.rows);
  svg.querySelectorAll('.bar').forEach(b=>{
    b.style.cursor='pointer';
    b.addEventListener('mousemove',e=>{
      const r=rows[+b.dataset.i];
      tip.innerHTML=`${ymLabel(r.ym)} · дельта <b class="${r.d>=0?'pos':'neg'}">${fmt(r.d,true)} ₽</b>${r.f?'':' <span class="mut">(план)</span>'}`;
      tip.style.opacity=1;
      tip.style.left=Math.min(window.innerWidth-220,e.clientX+14)+'px';
      tip.style.top=(e.clientY+14)+'px';
    });
    b.addEventListener('mouseleave',()=>tip.style.opacity=0);
    b.addEventListener('click',()=>{curYM=rows[+b.dataset.i].ym;activeTab='month';syncTabs();render();});
  });
}

      else badge=`<span class="badge bad">не хватает ${fmtR(g.amount-projAvg)} даже при среднем</span>`;
      return `<div class="goal" data-gid="${g.id}">

          <div class="spacer"></div>
          <button class="btn sm" data-act="gdone">Куплено</button>
          <button class="btn sm" data-act="gedit">Изменить</button>
          <button class="icon" data-act="gdel">✕</button>
        </div>
      </div>`;
    }).join(''):'<div class="empty">Целей пока нет. Добавь первую — авто, путешествие, технику.</div>'}
    </div>

  view.querySelectorAll('.goal').forEach(el=>{

      }
    });
  });
}

    <div class="row"><label class="f" style="width:280px">Консервативный бонус, $/мес</label><input id="sCons" value="${s.bonusCons}"></div>
    <div class="row"><label class="f" style="width:280px">Средний бонус, $/мес</label><input id="sAvg" value="${s.bonusAvg}"></div>
    <div class="row"><label class="f" style="width:280px">Начало горизонта</label><input type="month" id="sStart" value="${s.horizonStart}"></div>
  </div>
  <div class="grid2">
    <div class="panel">
      <h2>Шаблон · доходы <span class="note">для новых месяцев</span></h2>
      <div class="tblwrap"><table id="tInc"><thead><tr><th>Источник</th><th></th><th>День</th><th>Сумма</th><th></th></tr></thead><tbody>${tIncRows}</tbody></table></div>
      <div class="row" style="margin-top:12px"><button class="btn sm" id="tIncAdd">+ строка</button></div>
    </div>
    <div class="panel">
      <h2>Шаблон · расходы <span class="note">итого ${fmtR(state.template.expenses.reduce((s2,t)=>s2+(t.amount||0),0))}</span></h2>
      <div class="tblwrap"><table id="tExp"><thead><tr><th>Категория</th><th>Сумма</th><th></th></tr></thead><tbody>${tExpRows}</tbody></table></div>
      <div class="row" style="margin-top:12px"><button class="btn sm" id="tExpAdd">+ строка</button></div>
    </div>
  </div>
  <p class="hint">Шаблон применяется к месяцам, в которые ты ещё не вносил факты. Уже заполненные месяцы не трогаются — при необходимости жми «Сбросить к шаблону» внутри месяца.</p>`;

  document.getElementById('sRate').addEventListener('change',e=>{const v=parseNum(e.target.value);if(v){s.planRate=v;save();render();}});
  document.getElementById('sRateCbr').onclick=async e=>{e.target.textContent='…';try{s.planRate=await fetchCbr();save();render();}catch(err){e.target.textContent='Взять курс ЦБ';alert('Нет сети до ЦБ');}};
  document.getElementById('sCons').addEventListener('change',e=>{const v=parseNum(e.target.value);if(v!=null){s.bonusCons=v;save();render();}});
  document.getElementById('sAvg').addEventListener('change',e=>{const v=parseNum(e.target.value);if(v!=null){s.bonusAvg=v;save();render();}});
  document.getElementById('sStart').addEventListener('change',e=>{if(/^\d{4}-\d{2}$/.test(e.target.value)){s.horizonStart=e.target.value;save();render();}});
  const fOpen=document.getElementById('fOpen');if(fOpen)fOpen.onclick=()=>connectFile(false);
  const fNew=document.getElementById('fNew');if(fNew)fNew.onclick=()=>connectFile(true);
  const fOff=document.getElementById('fOff');if(fOff)fOff.onclick=disconnectFile;
  document.getElementById('fExp').onclick=exportJSON;
  document.getElementById('fImp').onclick=importJSON;

  function bindTpl(tblId,list){
    const tbl=document.getElementById(tblId);
    tbl.addEventListener('change',e=>{
      const tr=e.target.closest('tr');const t=list.find(x=>x.id===tr.dataset.tid);if(!t)return;
      const f=e.target.dataset.f;
      if(f==='name'||f==='cur')t[f]=e.target.value;else t[f]=parseNum(e.target.value);
      save();render();
    });
    tbl.addEventListener('click',e=>{
      const btn=e.target.closest('button');if(!btn||btn.dataset.act!=='del')return;
      const tr=e.target.closest('tr');
      if(confirm('Удалить из шаблона?')){
        const i=list.findIndex(x=>x.id===tr.dataset.tid);if(i>=0)list.splice(i,1);
        save();render();
      }
    });
  }
  bindTpl('tInc',state.template.incomes);
  bindTpl('tExp',state.template.expenses);
  document.getElementById('tIncAdd').onclick=()=>{state.template.incomes.push({id:uid(),name:'Новый доход',day:5,cur:'RUB',amount:0});save();render();};
  document.getElementById('tExpAdd').onclick=()=>{state.template.expenses.push({id:uid(),name:'Новая категория',amount:0});save();render();};
}

/* ============ init ============ */
document.getElementById('tabs').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  activeTab=b.dataset.tab;syncTabs();render();
});
function syncTabs(){document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b.dataset.tab===activeTab));}
window.addEventListener('beforeunload',()=>{localStorage.setItem(LS_KEY,JSON.stringify(state));});

render();
setSaveChip('local');
restoreHandle();
fetchCbr().then(r=>{document.getElementById('cbrNow').textContent=r.toFixed(2)+' ₽';}).catch(()=>{document.getElementById('cbrNow').textContent='офлайн';});
</script>
</body>
</html>
